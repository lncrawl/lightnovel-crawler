name: Build and Publish
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/lint.yml
    with:
      run_crawl_test: true
    permissions:
      contents: read

  build-docker:
    needs: validate
    uses: ./.github/workflows/build-docker.yml
    permissions:
      contents: read
      packages: write

  build-windows:
    name: Build & Publish (Windows)
    needs: validate
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🔄 Update submodules
        run: |
          git submodule sync
          git submodule update --init --remote --merge

      - name: 🧰 Install OpenSSL
        run: choco install -y --no-progress openssl

      - name: 🐍 Install uv & Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: 🏗️ Build Executable
        env:
          PYTHONIOENCODING: utf-8
          UV_PROJECT_ENVIRONMENT: .venv
        run: |
          uv sync --extra dev
          uv run python -m build -w
          uv run python setup_pyi.py
          .\dist\lncrawl.exe -ll sources list

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: lncrawl-windows
          path: dist/lncrawl.exe
          retention-days: 7

      - name: 🚀 Release Artifact
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/lncrawl.exe"
          allowUpdates: true
          artifactErrorsFailBuild: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: Build & Publish (MacOS)
    needs: validate
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🔄 Update submodules
        run: |
          git submodule sync
          git submodule update --init --remote --merge

      - name: 🐍 Install uv & Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: 🏗️ Build Executable
        env:
          PYTHONIOENCODING: utf-8
          UV_PROJECT_ENVIRONMENT: .venv
        run: |
          uv sync --extra dev
          uv run python -m build -w
          uv run python setup_pyi.py
          mv ./dist/lncrawl ./dist/lncrawl-mac
          ./dist/lncrawl-mac -ll sources list

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: lncrawl-mac
          path: dist/lncrawl-mac
          retention-days: 7

      - name: 🚀 Release Artifact
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/lncrawl-mac"
          allowUpdates: true
          artifactErrorsFailBuild: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build & Publish (Linux)
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🔄 Update submodules
        run: |
          git submodule sync
          git submodule update --init --remote --merge

      - name: 🐍 Install uv & Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: 🏗️ Build Executable
        env:
          PYTHONIOENCODING: utf-8
          UV_PROJECT_ENVIRONMENT: .venv
        run: |
          uv sync --extra dev
          uv run python -m build -w
          uv run python setup_pyi.py
          mv ./dist/lncrawl ./dist/lncrawl-linux
          ./dist/lncrawl-linux -ll sources list

      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lncrawl-linux
          path: |
            dist/lncrawl-linux
            dist/*.whl
          retention-days: 7

      - name: 🚀 Release Artifacts
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/lncrawl-linux,dist/*.whl"
          allowUpdates: true
          artifactErrorsFailBuild: true
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-package:
    name: PyPI Publish
    needs: [build-docker, build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # PyPI Trusted Publishing (OIDC) via gh-action-pypi-publish

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🔄 Update submodules
        run: |
          git submodule sync
          git submodule update --init --remote --merge

      - name: 🐍 Install uv & Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: 🏗️ Build Executable
        env:
          PYTHONIOENCODING: utf-8
          UV_PROJECT_ENVIRONMENT: .venv
        run: |
          uv sync --extra dev
          uv run python -m build -w

      - name: 📤 PyPI Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        env:
          verbose: true
          print-hash: true
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: 🔗 Update Download Links
        env:
          SHLINK_API_KEY: ${{ secrets.SHLINK_API_KEY }}
        run: sh ./scripts/bitanon.sh
