name: Build and Publish
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Validate VERSION tag
        run: |
          [ "${GITHUB_REF##*/}" == "v$(head -n 1 lncrawl/VERSION)" ] || exit 100

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8 build

      - name: 🧹 Lint Code
        run: flake8 -v --count --show-source --statistics

      - name: 🏗️ Build Wheel
        run: python -m build --wheel --no-isolation

      - name: 🧪 Test Wheel Installation
        run: |
          pip install dist/lightnovel_crawler*.whl
          lncrawl -ll sources list
          lncrawl -s 'https://novelfull.com/the-kings-avatar-for-the-glory.html' --first 2 -f --format epub --suppress -lll

  build-windows:
    needs: validate
    name: Build Windows Executable
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧰 Install OpenSSL
        run: choco install -y --no-progress openssl

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 🏗️ Build Windows Executable
        env:
          PYTHONIOENCODING: utf-8
        run: .\scripts\build.bat

      - name: 🧪 Test Executable
        env:
          PYTHONIOENCODING: utf-8
        run: .\dist\lncrawl.exe -ll sources list

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lncrawl-windows
          path: dist/lncrawl.exe

      - name: 🚀 Release Artifact
        if: github.repository == 'lncrawl/lightnovel-crawler'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/lncrawl.exe"
          allowUpdates: true
          artifactErrorsFailBuild: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: validate
    name: Build MacOS Executable
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 🏗️ Build MacOS Executable
        run: |
          sh ./scripts/build.sh
          mv ./dist/lncrawl ./dist/lncrawl-mac

      - name: 🧪 Test Executable
        run: ./dist/lncrawl-mac -ll sources list

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lncrawl-mac
          path: dist/lncrawl-mac

      - name: 🚀 Release Artifact
        if: github.repository == 'lncrawl/lightnovel-crawler'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/lncrawl-mac"
          allowUpdates: true
          artifactErrorsFailBuild: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: validate
    name: Build & Publish Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: 🏗️ Build Linux Executable
        run: |
          sh ./scripts/build.sh
          mv ./dist/lncrawl ./dist/lncrawl-linux

      - name: 🧪 Test Executable
        run: ./dist/lncrawl-linux -ll sources list

      - name: 📦 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lncrawl-linux
          path: |
            dist/lncrawl-linux
            dist/*.whl

      - name: 🚀 Release Artifacts
        if: github.repository == 'lncrawl/lightnovel-crawler'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/lncrawl-linux,dist/*.whl"
          allowUpdates: true
          artifactErrorsFailBuild: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔗 Update Download Links
        if: github.repository == 'lncrawl/lightnovel-crawler'
        env:
          SHLINK_API_KEY: ${{ secrets.SHLINK_API_KEY }}
        run: sh ./scripts/bitanon.sh

      - name: 📦 Publish to PyPI
        if: github.repository == 'lncrawl/lightnovel-crawler'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_NON_INTERACTIVE: true
        run: sh ./scripts/publish.sh

  build-docker:
    needs: [validate]
    name: Build & Publish Docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # required for GHCR pushes

    env:
      REGISTRY: ghcr.io

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set lowercase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: 🏗️ Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Read package version
        id: package_version
        run: echo "version=$(head -n 1 lncrawl/VERSION)" >> "$GITHUB_OUTPUT"

      - name: 🏗️ Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ steps.package_version.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
