name: Lint & Test

on:
  workflow_call: {}
  workflow_dispatch: {}
  push:
    branches:
      - master
      - dev
    paths:
      - "lncrawl/**"
      - "sources/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".flake8"
      - ".github/workflows/lint.yml"
  pull_request:
    branches:
      - dev
    paths:
      - "lncrawl/**"
      - "sources/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".flake8"
      - ".github/workflows/lint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    name: Python ${{ matrix.python-version }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🐍 Install uv & Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: 📦 Install Dependencies
        run: uv sync --frozen --extra dev

      - name: 🧹 Lint Code
        run: uv run flake8 -v --count --show-source --statistics

      - name: 🏗️ Build Wheel
        run: uv run python -m build --wheel --no-isolation

      - name: 🧪 Test Installation
        run: pip install dist/lightnovel_crawler*.whl

      - name: 🧪 Check lncrawl
        run: lncrawl -ll sources list

      - name: 🧪 Test Crawl
        if: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' }}
        run: lncrawl -ll crawl 'https://novelfull.com/the-kings-avatar-for-the-glory.html' --first 2 --format epub --noin
